<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part-Out AI | Car Part Background Remover</title>
    
    <!-- 1. CSS Styles (Aesthetics) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkerboard { 
            background-color: #0f172a;
            background-image:  linear-gradient(45deg, #1e293b 25%, transparent 25%), linear-gradient(-45deg, #1e293b 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1e293b 75%), linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>

    <!-- 2. ERROR HANDLING (Moved to top so it's ready immediately) -->
    <script>
        function updateStatus(msg, colorClass) {
            const badge = document.getElementById('status-badge');
            if (badge) {
                badge.innerText = msg;
                badge.className = `mt-4 inline-block px-4 py-1 rounded-full border ${colorClass} text-xs font-bold tracking-widest uppercase`;
            }
        }

        function handleLibError() {
            updateStatus("CDN Error: Library Failed", "border-red-500 bg-red-900/50 text-white");
            const prompt = document.getElementById('prompt-text');
            if (prompt) prompt.innerText = "Check your internet and refresh.";
        }
    </script>
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-6 md:p-12 text-center">
        <header class="mb-10">
            <h1 class="text-5xl font-black text-blue-500 tracking-tighter uppercase italic">Part-Out AI</h1>
            <p class="text-gray-400 mt-2 font-medium tracking-wide italic">Precision Background Removal</p>
            <div id="status-badge" class="mt-4 inline-block px-4 py-1 rounded-full border border-yellow-500/50 bg-yellow-500/10 text-yellow-500 text-xs font-bold tracking-widest uppercase animate-pulse">
                Initializing Engine...
            </div>
        </header>

        <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl text-left">
            
            <!-- Drag & Drop Zone -->
            <div id="drop-zone" class="relative group border-4 border-dashed border-gray-800 rounded-2xl p-12 text-center transition-all opacity-40 cursor-not-allowed">
                <input type="file" id="file-upload" class="hidden" accept="image/*">
                
                <div class="space-y-4 pointer-events-none">
                    <div class="w-16 h-16 bg-blue-500/10 text-blue-500 rounded-full flex items-center justify-center mx-auto transition-transform group-hover:scale-110">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"></path></svg>
                    </div>
                    <p id="prompt-text" class="text-xl font-bold text-gray-500 uppercase">Wait for Engine...</p>
                </div>

                <!-- Processing UI -->
                <div id="progress-overlay" class="hidden absolute inset-0 bg-gray-900/95 flex flex-col items-center justify-center rounded-xl p-6 z-50">
                    <p id="progress-text" class="text-blue-400 font-bold mb-4 uppercase tracking-widest text-sm text-center italic">Downloading AI Model (20MB)...</p>
                    <div class="w-full max-w-xs bg-gray-800 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300 shadow-[0_0_15px_#3b82f6]"></div>
                    </div>
                </div>
            </div>

            <!-- Preview Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">
                <div>
                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] text-center mb-3">1. Chromakey Green</h3>
                    <canvas id="canvas-green" class="w-full aspect-square bg-black rounded-2xl border border-gray-800"></canvas>
                </div>
                <div>
