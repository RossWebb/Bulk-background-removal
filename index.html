<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part-Out Vector | Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">
    <div class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="mb-8 text-center">
            <h1 class="text-5xl font-black text-blue-500 tracking-tighter uppercase italic">Part-Out Vector</h1>
            <p class="text-gray-400">Stable Version • Better Parsing</p>
            <div id="status-badge" class="mt-4 inline-block px-4 py-1 rounded-full border border-yellow-500 bg-yellow-500/10 text-yellow-500 text-xs font-bold tracking-widest uppercase">
                Enter Gemini API Key
            </div>
        </header>

        <div id="api-panel" class="max-w-md mx-auto mb-8 bg-slate-900 border border-slate-800 rounded-2xl p-4 flex gap-2">
            <input type="password" id="api-key-input" placeholder="Paste Gemini API Key" 
                   class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm w-full focus:outline-none focus:border-blue-500">
            <button id="save-key-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl text-sm font-bold">Connect</button>
        </div>

        <div id="main-app" class="hidden bg-slate-900 border border-slate-800 rounded-3xl p-8">
            <div id="drop-zone" class="border-4 border-dashed border-slate-700 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-500">
                <input type="file" id="file-upload" class="hidden" accept="image/*" multiple>
                <p class="text-blue-400 font-bold text-xl">Drop Images Here</p>
            </div>

            <div id="log-container" class="mt-6 max-h-96 overflow-auto text-xs font-mono bg-black/50 p-4 rounded-xl"></div>

            <div id="preview-container" class="hidden mt-6">
                <h3 class="text-sm font-bold mb-2">Last Result</h3>
                <canvas id="display-canvas" class="max-w-full border border-slate-700 rounded-xl bg-white"></canvas>
                <button id="manual-download" class="mt-4 bg-green-600 hover:bg-green-500 px-6 py-3 rounded-xl font-bold w-full">
                    Download Last Image Again
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let genAI = null;
        let fileQueue = [];
        let currentIndex = 0;
        let lastCanvasDataURL = null;

        const statusBadge = document.getElementById('status-badge');
        const apiPanel = document.getElementById('api-panel');
        const mainApp = document.getElementById('main-app');
        const dropZone = document.getElementById('drop-zone');
        const fileUpload = document.getElementById('file-upload');
        const logContainer = document.getElementById('log-container');
        const previewContainer = document.getElementById('preview-container');
        const displayCanvas = document.getElementById('display-canvas');
        const manualDownloadBtn = document.getElementById('manual-download');

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-gray-400';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        const savedKey = localStorage.getItem('gemini_vector_key');
        if (savedKey) initEngine(savedKey);

        document.getElementById('save-key-btn').onclick = () => {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('gemini_vector_key', key);
                initEngine(key);
            }
        };

        function initEngine(key) {
            try {
                genAI = new GoogleGenerativeAI(key);
                apiPanel.classList.add('hidden');
                mainApp.classList.remove('hidden');
                statusBadge.textContent = "✅ Gemini 2.5 Flash Ready";
                statusBadge.className = "mt-4 inline-block px-4 py-1 rounded-full border border-green-500 bg-green-500/10 text-green-500 text-xs font-bold tracking-widest uppercase";
                setupEvents();
                log("Engine initialized successfully", "success");
            } catch (e) {
                log("Init error: " + e.message, "error");
            }
        }

        function setupEvents() {
            dropZone.onclick = () => fileUpload.click();
            dropZone.ondrop = e => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
            dropZone.ondragover = e => e.preventDefault();
            fileUpload.onchange = e => handleFiles(e.target.files);
            manualDownloadBtn.onclick = () => {
                if (lastCanvasDataURL) {
                    const a = document.createElement('a');
                    a.href = lastCanvasDataURL;
                    a.download = `clipped-${Date.now()}.png`;
                    a.click();
                }
            };
        }

        function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
            if (files.length === 0) return;
            fileQueue = files;
            currentIndex = 0;
            logContainer.innerHTML = '';
            previewContainer.classList.add('hidden');
            log(`Starting batch of ${files.length} images`, "success");
            processNext();
        }

        async function processNext() {
            if (currentIndex >= fileQueue.length) {
                log("✅ Batch completed!", "success");
                return;
            }

            const file = fileQueue[currentIndex];
            log(`Processing: ${file.name}`);

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });
                const imagePart = await fileToGenerativePart(file);

                const result = await model.generateContent([
                    imagePart,
                    "Return only a JSON array with exactly 4 numbers: [ymin, xmin, ymax, xmax] using 0-1000 scale. No other text."
                ]);

                let text = result.response.text().trim();
                log("Response received");

                const box = extractBox(text);
                if (!box) throw new Error("Could not extract coordinates");

                await clipAndSave(file, box);
                log(`✅ Clipped ${file.name}`, "success");

            } catch (err) {
                log(`❌ ERROR on ${file.name}: ${err.message}`, "error");
                console.error(err);
            }

            currentIndex++;
            setTimeout(processNext, 900);
        }

        function extractBox(text) {
            // Clean common wrappers
            text = text.replace(/```json|```|json/g, '').trim();
            
            try {
                const parsed = JSON.parse(text);
                if (Array.isArray(parsed) && parsed.length === 4) return parsed.map(Number);
            } catch (e) {}

            // Fallback: extract first 4 numbers
            const matches = text.match(/\d+/g);
            if (matches && matches.length >= 4) {
                return matches.slice(0, 4).map(Number);
            }
            return null;
        }

        async function clipAndSave(file, box) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = displayCanvas;
                        const ctx = canvas.getContext('2d');

                        let [yMin, xMin, yMax, xMax] = box;

                        yMin = (yMin / 1000) * img.height;
                        xMin = (xMin / 1000) * img.width;
                        yMax = (yMax / 1000) * img.height;
                        xMax = (xMax / 1000) * img.width;

                        const padX = img.width * 0.045;
                        const padY = img.height * 0.045;

                        xMin = Math.max(0, xMin - padX);
                        yMin = Math.max(0, yMin - padY);
                        xMax = Math.min(img.width, xMax + padX);
                        yMax = Math.min(img.height, yMax + padY);

                        const w = xMax - xMin;
                        const h = yMax - yMin;

                        if (w < 30 || h < 30) {
                            log("Box too small", "error");
                            resolve();
                            return;
                        }

                        canvas.width = w;
                        canvas.height = h;
                        ctx.drawImage(img, xMin, yMin, w, h, 0, 0, w, h);

                        removeBackground(ctx, w, h);

                        lastCanvasDataURL = canvas.toDataURL('image/png');
                        previewContainer.classList.remove('hidden');

                        const a = document.createElement('a');
                        a.href = lastCanvasDataURL;
                        a.download = `clipped-${file.name.replace(/\.[^/.]+$/, "")}.png`;
                        a.click();

                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function removeBackground(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            const tolerance = 68;

            const samples = [
                {x:8, y:8}, {x:width-9, y:8},
                {x:8, y:height-9}, {x:width-9, y:height-9}
            ];

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                let isBg = false;
                for (const s of samples) {
                    const idx = (s.y * width + s.x) * 4;
                    const dist = Math.hypot(r - data[idx], g - data[idx+1], b - data[idx+2]);
                    if (dist < tolerance) {
                        isBg = true;
                        break;
                    }
                }
                if (isBg) data[i+3] = 0;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function fileToGenerativePart(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onloadend = () => resolve({
                    inlineData: { data: reader.result.split(',')[1], mimeType: file.type }
                });
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
