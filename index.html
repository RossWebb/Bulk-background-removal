<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part-Out Vector | Improved</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans">
    <div class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="mb-8 text-center">
            <h1 class="text-5xl font-black text-blue-500 tracking-tighter uppercase italic">Part-Out Vector</h1>
            <p class="text-gray-400">Tighter Crop + Stronger Background Removal</p>
            <div id="status-badge" class="mt-4 inline-block px-4 py-1 rounded-full border border-green-500 bg-green-500/10 text-green-500 text-xs font-bold tracking-widest uppercase">
                Gemini 2.5 Flash Ready
            </div>
        </header>

        <div id="api-panel" class="max-w-md mx-auto mb-8 bg-slate-900 border border-slate-800 rounded-2xl p-4 flex gap-2">
            <input type="password" id="api-key-input" placeholder="Paste Gemini API Key" 
                   class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm w-full focus:outline-none focus:border-blue-500">
            <button id="save-key-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl text-sm font-bold">Connect</button>
        </div>

        <div id="main-app" class="hidden bg-slate-900 border border-slate-800 rounded-3xl p-8">
            <div id="drop-zone" class="border-4 border-dashed border-slate-700 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-500">
                <input type="file" id="file-upload" class="hidden" accept="image/*" multiple>
                <p class="text-blue-400 font-bold text-xl">Drop Images Here</p>
            </div>

            <div id="log-container" class="mt-6 max-h-80 overflow-auto text-xs font-mono bg-black/50 p-4 rounded-xl"></div>

            <div id="preview-container" class="hidden mt-6">
                <h3 class="text-sm font-bold mb-2">Result</h3>
                <canvas id="display-canvas" class="max-w-full border border-slate-700 rounded-xl"></canvas>
                <button id="manual-download" class="mt-4 bg-green-600 hover:bg-green-500 px-6 py-3 rounded-xl font-bold w-full">
                    Download Image
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let genAI = null;
        let fileQueue = [];
        let currentIndex = 0;
        let lastDataURL = null;

        const statusBadge = document.getElementById('status-badge');
        const apiPanel = document.getElementById('api-panel');
        const mainApp = document.getElementById('main-app');
        const dropZone = document.getElementById('drop-zone');
        const fileUpload = document.getElementById('file-upload');
        const logContainer = document.getElementById('log-container');
        const previewContainer = document.getElementById('preview-container');
        const displayCanvas = document.getElementById('display-canvas');
        const manualDownloadBtn = document.getElementById('manual-download');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : '';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        const savedKey = localStorage.getItem('gemini_vector_key');
        if (savedKey) initEngine(savedKey);

        document.getElementById('save-key-btn').onclick = () => {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('gemini_vector_key', key);
                initEngine(key);
            }
        };

        function initEngine(key) {
            genAI = new GoogleGenerativeAI(key);
            apiPanel.classList.add('hidden');
            mainApp.classList.remove('hidden');
            log("Connected successfully", "success");
            setupEvents();
        }

        function setupEvents() {
            dropZone.onclick = () => fileUpload.click();
            dropZone.ondrop = e => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
            dropZone.ondragover = e => e.preventDefault();
            fileUpload.onchange = e => handleFiles(e.target.files);
            manualDownloadBtn.onclick = () => {
                if (lastDataURL) {
                    const a = document.createElement('a');
                    a.href = lastDataURL;
                    a.download = `part-${Date.now()}.png`;
                    a.click();
                }
            };
        }

        function handleFiles(files) {
            const images = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (!images.length) return;
            fileQueue = images;
            currentIndex = 0;
            logContainer.innerHTML = '';
            previewContainer.classList.add('hidden');
            processNext();
        }

        async function processNext() {
            if (currentIndex >= fileQueue.length) {
                log("Batch finished", "success");
                return;
            }

            const file = fileQueue[currentIndex];
            log(`Processing ${file.name}`);

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });
                const imagePart = await fileToGenerativePart(file);

                const result = await model.generateContent([
                    imagePart,
                    `Return ONLY a tight bounding box around the main automotive part.
Focus on the object itself, ignore background and shadows.
Output exactly 4 numbers in JSON array: [ymin, xmin, ymax, xmax] (0-1000 scale)`
                ]);

                let text = result.response.text().trim();
                const box = extractBox(text);
                if (!box) throw new Error("Failed to get coordinates");

                await clipImage(file, box);
                log(`✅ Done: ${file.name}`, "success");

            } catch (e) {
                log(`❌ ${file.name}: ${e.message}`, "error");
            }

            currentIndex++;
            setTimeout(processNext, 1000);
        }

        function extractBox(text) {
            text = text.replace(/```json|```/g, '').trim();
            try {
                let arr = JSON.parse(text);
                if (Array.isArray(arr)) return arr.map(n => Number(n));
            } catch {}
            
            const nums = text.match(/\d+/g);
            return nums && nums.length >= 4 ? nums.slice(0,4).map(Number) : null;
        }

        async function clipImage(file, box) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = displayCanvas;
                        const ctx = canvas.getContext('2d');

                        let [ymin, xmin, ymax, xmax] = box;

                        ymin = (ymin / 1000) * img.height;
                        xmin = (xmin / 1000) * img.width;
                        ymax = (ymax / 1000) * img.height;
                        xmax = (xmax / 1000) * img.width;

                        const pad = 0.03;
                        xmin = Math.max(0, xmin - img.width * pad);
                        ymin = Math.max(0, ymin - img.height * pad);
                        xmax = Math.min(img.width, xmax + img.width * pad);
                        ymax = Math.min(img.height, ymax + img.height * pad);

                        const w = xmax - xmin;
                        const h = ymax - ymin;

                        canvas.width = w;
                        canvas.height = h;
                        ctx.drawImage(img, xmin, ymin, w, h, 0, 0, w, h);

                        advancedRemoveBackground(ctx, w, h);

                        lastDataURL = canvas.toDataURL('image/png');
                        previewContainer.classList.remove('hidden');

                        // Auto download
                        const a = document.createElement('a');
                        a.href = lastDataURL;
                        a.download = `clipped-${file.name.replace(/\.[^/.]+$/, "")}.png`;
                        a.click();

                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function advancedRemoveBackground(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            const tolerance = 75;

            // Sample more background points
            const samples = [];
            for (let i = 0; i < 6; i++) {
                const x = Math.floor(Math.random() * (width * 0.2)) + 5;
                const y = Math.floor(Math.random() * (height * 0.2)) + 5;
                const idx = (y * width + x) * 4;
                samples.push({r: data[idx], g: data[idx+1], b: data[idx+2]});
            }

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                let isBackground = false;

                for (const s of samples) {
                    const dist = Math.hypot(r - s.r, g - s.g, b - s.b);
                    if (dist < tolerance) {
                        isBackground = true;
                        break;
                    }
                }

                if (isBackground) data[i + 3] = 0;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function fileToGenerativePart(file) {
            return new Promise(resolve => {
                const r = new FileReader();
                r.onloadend = () => resolve({
                    inlineData: { data: r.result.split(',')[1], mimeType: file.type }
                });
                r.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
