<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Part-Out Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 1. Mandatory for GitHub Pages WASM performance -->
    <script src="coi-serviceworker.js"></script>

    <!-- 2. The AI Library -->
    <script src="https://unpkg.com/@imgly/background-removal@1.4.5/dist/index.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4">

    <div class="max-w-4xl mx-auto py-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">CAR PART CUTOUT</h1>
            <p id="init-status" class="text-yellow-500 text-sm mt-2 font-mono">Loading AI Engine...</p>
        </div>

        <div id="drop-zone" class="border-2 border-dashed border-slate-700 bg-slate-900/50 p-16 rounded-3xl text-center cursor-pointer hover:border-blue-500 transition-all">
            <input type="file" id="file-upload" class="hidden" accept="image/*">
            <p id="prompt-text" class="text-slate-400 text-lg">Initializing...</p>
            <div id="progress-bar-container" class="hidden mt-4 w-48 mx-auto bg-slate-800 h-1 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10">
            <canvas id="c1" class="w-full rounded-xl border border-slate-800 bg-black"></canvas>
            <canvas id="c2" class="w-full rounded-xl border border-slate-800 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></canvas>
        </div>

        <div class="mt-10 text-center">
            <button id="dl-btn" disabled class="bg-blue-600 px-10 py-3 rounded-full font-bold disabled:opacity-20 transition-all">DOWNLOAD PNG</button>
        </div>
    </div>

    <script>
        const status = document.getElementById('init-status');
        const prompt = document.getElementById('prompt-text');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const progressCont = document.getElementById('progress-bar-container');
        const progressFill = document.getElementById('progress-bar');
        const dlBtn = document.getElementById('dl-btn');

        // Check if library loaded every 500ms
        const checkLib = setInterval(() => {
            if (window.imglyRemoveBackground) {
                clearInterval(checkLib);
                status.innerText = "AI Engine Ready";
                status.className = "text-green-500 text-sm mt-2 font-mono";
                prompt.innerText = "Click or Drop Car Part Image";
            }
        }, 500);

        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            if (e.target.files[0]) process(e.target.files[0]);
        };

        async function process(file) {
            prompt.innerText = "Analyzing Pixels...";
            progressCont.classList.remove('hidden');
            dlBtn.disabled = true;

            try {
                // The library call
                const blob = await imglyRemoveBackground.removeBackground(file, {
                    model: 'medium',
                    progress: (item, loaded, total) => {
                        progressFill.style.width = `${(loaded/total)*100}%`;
                    }
                });

                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    const c1 = document.getElementById('c1');
                    const c2 = document.getElementById('c2');
                    const ctx1 = c1.getContext('2d');
                    const ctx2 = c2.getContext('2d');

                    c1.width = c2.width = img.width;
                    c1.height = c2.height = img.height;

                    // Green Screen
                    ctx1.fillStyle = '#00FF00';
                    ctx1.fillRect(0,0,c1.width,c1.height);
                    ctx1.drawImage(img, 0, 0);

                    // Transparent
                    ctx2.clearRect(0,0,c2.width,c2.height);
                    ctx2.drawImage(img, 0, 0);

                    prompt.innerText = "Done!";
                    dlBtn.disabled = false;
                    dlBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.download = 'cutout.png';
                        a.href = c2.toDataURL();
                        a.click();
                    };
                };
                img.src = url;
            } catch (err) {
                prompt.innerText = "Error: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
