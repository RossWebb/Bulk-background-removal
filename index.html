<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Part Background Remover</title>
    <!-- We use the library from a reliable CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/index.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; text-align: center; }
        h1 { color: #3b82f6; letter-spacing: -1px; margin-bottom: 5px; }
        .status { font-family: monospace; font-size: 14px; margin-bottom: 20px; color: #94a3b8; }
        .drop-zone { border: 3px dashed #1e293b; background: #1e293b55; padding: 60px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { border-color: #3b82f6; background: #1e293b88; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        canvas { width: 100%; background: #000; border-radius: 12px; border: 1px solid #334155; }
        /* CSS-only checkerboard for the transparent preview */
        .checkerboard { 
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), linear-gradient(-45deg, #222 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #222 75%), linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        button { background: #3b82f6; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        #progress-bar { width: 0%; height: 4px; background: #3b82f6; margin-top: 10px; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PART-OUT AI</h1>
        <div id="status" class="status">Waiting for library...</div>

        <div id="drop-zone" class="drop-zone">
            <input type="file" id="file-upload" hidden accept="image/*">
            <div id="prompt">Drop car part image here</div>
            <div style="width: 100%; background: #0f172a; height: 4px; margin-top: 15px; border-radius: 2px;">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div class="grid">
            <div>
                <p style="font-size:12px; color:#64748b">STAGE 1: GREEN SCREEN</p>
                <canvas id="c1"></canvas>
            </div>
            <div>
                <p style="font-size:12px; color:#64748b">STAGE 2: TRANSPARENT</p>
                <canvas id="c2" class="checkerboard"></canvas>
            </div>
        </div>

        <button id="dl-btn" disabled>DOWNLOAD PNG</button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const promptEl = document.getElementById('prompt');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const progressEl = document.getElementById('progress-bar');
        const dlBtn = document.getElementById('dl-btn');

        // Check if library is ready
        const check = setInterval(() => {
            if (window.imglyRemoveBackground) {
                clearInterval(check);
                statusEl.innerText = "AI Engine: READY";
                statusEl.style.color = "#22c55e";
                promptEl.innerText = "Click to Upload or Drag & Drop";
            }
        }, 500);

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if(e.target.files[0]) process(e.target.files[0]); };

        async function process(file) {
            promptEl.innerText = "AI is working...";
            dlBtn.disabled = true;
            
            try {
                // CONFIG IS KEY: Pointing specifically to the CDN for WASM assets
                const config = {
                    publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/",
                    model: 'medium',
                    progress: (item, loaded, total) => {
                        progressEl.style.width = `${(loaded/total)*100}%`;
                    }
                };

                const blob = await imglyRemoveBackground.removeBackground(file, config);
                const url = URL.createObjectURL(blob);
                const img = new Image();

                img.onload = () => {
                    const c1 = document.getElementById('c1');
                    const c2 = document.getElementById('c2');
                    const ctx1 = c1.getContext('2d');
                    const ctx2 = c2.getContext('2d');

                    c1.width = c2.width = img.width;
                    c1.height = c2.height = img.height;

                    // Stage 1
                    ctx1.fillStyle = '#00FF00';
                    ctx1.fillRect(0,0,c1.width,c1.height);
                    ctx1.drawImage(img, 0, 0);

                    // Stage 2
                    ctx2.clearRect(0,0,c2.width,c2.height);
                    ctx2.drawImage(img, 0, 0);

                    promptEl.innerText = "Processing Complete!";
                    dlBtn.disabled = false;
                    dlBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.download = 'car-part.png';
                        a.href = c2.toDataURL();
                        a.click();
                    };
                };
                img.src = url;

            } catch (err) {
                promptEl.innerText = "Error!";
                statusEl.innerText = "Error: " + err.message;
                statusEl.style.color = "#ef4444";
                console.error(err);
            }
        }
    </script>
</body>
</html>
